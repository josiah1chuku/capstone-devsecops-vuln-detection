name: Vulnerability Detection CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install torch==2.1.0 --index-url https://download.pytorch.org/whl/cpu
          pip install transformers==4.35.0 huggingface-hub==0.16.4
          pip install numpy==1.26.4 pandas scikit-learn matplotlib tqdm
      - name: Run vulnerability scan
        run: |
          python step6_eval/evaluate.py \
            --mode ci --sample_size 100 \
            --output_path results/ci_report.json
      - name: Show results
        run: |
          python -c "
          import json
          with open('results/ci_report.json') as f:
              r = json.load(f)
          print('AUC-ROC  :', r.get('auc','N/A'))
          print('F1 Score :', r.get('f1_optimal','N/A'))
          print('Flagged  :', r.get('flagged','N/A'), 'functions')
          "
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results-${{ github.sha }}
          path: results/
          retention-days: 30
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('results/ci_report.json','utf8'));
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## VulnDetector Scan Results
| Metric | Value |
|--------|-------|
| AUC-ROC | ${r.auc?.toFixed(4) ?? 'N/A'} |
| F1 Score | ${r.f1_optimal?.toFixed(4) ?? 'N/A'} |
| Flagged | ${r.flagged ?? 'N/A'} functions |
| Scanned | ${r.total ?? 'N/A'} functions |`
            });
