name: Vulnerability Detection CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install numpy pandas scikit-learn matplotlib
      - name: Run evaluation
        run: python step6_eval/evaluate.py --mode ci
